# mise configuration - replaces asdf for language runtime management
# https://mise.jdx.dev/configuration.html

[tools]
# Language runtimes (migrated from asdf)
nodejs = "lts"        # Use LTS for stability
ruby = "latest"
python = "3.13"       # Use stable version (3.14 not fully released)

# CLI tools
zellij = "latest"

[settings]
# Enable experimental features if needed
experimental = false

# Verbose output for debugging
verbose = false
